<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1150" viewBox="0 0 1600 1150">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill:#f8fafc; }
      .title { font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size:34px; font-weight:800; fill:#0f172a; }
      .subtitle { font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size:17px; fill:#475569; }
      .section-title { font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size:21px; font-weight:800; fill:#0f172a; }
      .label { font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size:15px; fill:#334155; }
      .small { font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size:13px; fill:#475569; }
      .tiny { font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size:12px; fill:#64748b; }
      .card { fill:#ffffff; stroke:#e2e8f0; stroke-width:1.5; rx:18; filter:url(#shadow); }
      .panel { fill:#ffffff; stroke:#dbeafe; stroke-width:2; rx:18; }
      .sidebar { fill:#f1f5f9; stroke:#cbd5e1; stroke-width:2; rx:20; }
      .map { fill:#dbeafe; stroke:#93c5fd; stroke-width:2; rx:20; }
      .banner-pick { fill:#e0f2fe; stroke:#0ea5e9; stroke-width:2; rx:14; }
      .banner-config { fill:#fef3c7; stroke:#f59e0b; stroke-width:2; rx:14; }
      .banner-result { fill:#dcfce7; stroke:#22c55e; stroke-width:2; rx:14; }
      .ai { fill:#f8fafc; stroke:#38bdf8; stroke-width:2; rx:16; }
      .blue { fill:#2563eb; }
      .green { fill:#22c55e; }
      .amber { fill:#f59e0b; }
      .red { fill:#ef4444; }
      .sky { fill:#0ea5e9; }
      .purple { fill:#a855f7; }
      .text-white { fill:#ffffff; font-weight:800; }
      .mono { font-family: 'Consolas', 'D2Coding', monospace; font-size:13px; fill:#334155; }
      .line-blue { stroke:#2563eb; stroke-width:4; fill:none; marker-end:url(#arrow-blue); }
      .line-gray { stroke:#64748b; stroke-width:2.5; fill:none; marker-end:url(#arrow-gray); }
      .dash { stroke-dasharray:8 7; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1150"/>
  <text class="title" x="80" y="70">TyphoonPath UI Architecture</text>
  <text class="subtitle" x="82" y="102">태풍 경로 예측 서비스 화면 구조 · 상태 흐름 · 지도 레이어 · 컴포넌트 구성</text>

  <!-- Browser Layout -->
  <rect class="card" x="70" y="135" width="1460" height="545"/>
  <text class="section-title" x="105" y="178">1. 전체 화면 레이아웃</text>
  <text class="small" x="107" y="205">Browser 100vw × 100vh / Desktop MVP 1280px 이상 기준</text>

  <rect class="sidebar" x="105" y="230" width="300" height="410"/>
  <text class="section-title" x="130" y="270">🌀 TyphoonPath</text>
  <text class="tiny" x="130" y="293">Sidebar fixed 280px</text>

  <!-- Step indicator -->
  <circle class="green" cx="155" cy="330" r="19"/><text class="text-white label" x="149" y="336">✓</text>
  <line x1="175" y1="330" x2="225" y2="330" stroke="#22c55e" stroke-width="5"/>
  <circle class="blue" cx="245" cy="330" r="19"/><text class="text-white label" x="240" y="336">2</text>
  <line x1="265" y1="330" x2="315" y2="330" stroke="#e2e8f0" stroke-width="5"/>
  <circle fill="#e2e8f0" cx="335" cy="330" r="19"/><text class="label" x="330" y="336">3</text>

  <rect class="panel" x="128" y="365" width="254" height="60"/>
  <text class="label" x="145" y="390">STEP 1  시작점 설정</text>
  <text class="small" x="145" y="412">📍 좌표 표시 / 변경 링크</text>

  <rect class="panel" x="128" y="438" width="254" height="92"/>
  <text class="label" x="145" y="463">STEP 2  기상 조건 설정</text>
  <text class="small" x="145" y="486">중심기압 · SST 슬라이더</text>
  <rect class="blue" x="145" y="499" width="205" height="22" rx="11"/>
  <text class="tiny" x="184" y="515" fill="#ffffff">🌀 경로 예측하기</text>

  <rect class="panel" x="128" y="543" width="254" height="64"/>
  <text class="label" x="145" y="568">STEP 3  예측 결과</text>
  <text class="small" x="145" y="590">배지 · 유사 태풍 · 재예측</text>

  <text class="tiny" x="132" y="625">범례: STY / TY / TS / TD</text>

  <!-- Main area -->
  <rect fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="20" x="435" y="230" width="1050" height="410"/>
  <rect class="banner-config" x="465" y="255" width="990" height="60"/>
  <text class="label" x="490" y="291">⚙️ 기상 조건을 설정하고 “경로 예측하기”를 눌러주세요</text>

  <rect class="map" x="465" y="335" width="990" height="210"/>
  <text class="section-title" x="865" y="440">지도 영역</text>
  <text class="small" x="810" y="467">Leaflet / OpenStreetMap</text>

  <!-- Decorative path -->
  <path d="M 620 500 C 730 420, 815 520, 930 430 S 1160 350, 1290 420" stroke="#2563eb" stroke-width="5" fill="none"/>
  <circle cx="620" cy="500" r="10" fill="#0ea5e9" stroke="#ffffff" stroke-width="3"/>
  <circle cx="760" cy="455" r="9" fill="#f59e0b" stroke="#ffffff" stroke-width="3"/>
  <circle cx="930" cy="430" r="9" fill="#ef4444" stroke="#ffffff" stroke-width="3"/>
  <circle cx="1130" cy="378" r="9" fill="#f59e0b" stroke="#ffffff" stroke-width="3"/>
  <circle cx="1290" cy="420" r="9" fill="#0ea5e9" stroke="#ffffff" stroke-width="3"/>
  <path d="M 650 530 C 770 560, 870 510, 1000 515 S 1190 560, 1320 500" stroke="#facc15" stroke-width="3" fill="none" stroke-dasharray="9 7" opacity=".65"/>
  <path d="M 620 470 C 740 380, 920 380, 1040 330 S 1210 300, 1370 340" stroke="#a855f7" stroke-width="3" fill="none" stroke-dasharray="9 7" opacity=".5"/>
  <rect class="ai" x="465" y="565" width="990" height="48"/>
  <text class="label" x="490" y="595">🤖 AI 기상 해설 패널: result 단계에서만 표시 · 최대 높이 180px · overflow-y auto</text>

  <!-- State Flow -->
  <rect class="card" x="70" y="715" width="710" height="350"/>
  <text class="section-title" x="105" y="758">2. UX 상태 흐름</text>
  <text class="small" x="107" y="785">phase 중심으로 화면 표시와 사용자 행동이 전환됨</text>

  <rect fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2" rx="16" x="105" y="825" width="135" height="80"/>
  <text class="label" x="143" y="858">pick</text>
  <text class="tiny" x="128" y="882">지도 클릭 대기</text>

  <rect fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="16" x="315" y="825" width="135" height="80"/>
  <text class="label" x="354" y="858">config</text>
  <text class="tiny" x="326" y="882">기상 조건 설정</text>

  <rect fill="#f1f5f9" stroke="#64748b" stroke-width="2" rx="16" x="525" y="825" width="135" height="80"/>
  <text class="label" x="562" y="858">loading</text>
  <text class="tiny" x="547" y="882">API 요청 중</text>

  <rect fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="16" x="525" y="955" width="135" height="80"/>
  <text class="label" x="562" y="988">result</text>
  <text class="tiny" x="545" y="1012">예측 결과 표시</text>

  <path class="line-blue" d="M 240 865 L 310 865"/>
  <text class="tiny" x="252" y="846">handleMapClick</text>
  <path class="line-blue" d="M 450 865 L 520 865"/>
  <text class="tiny" x="463" y="846">handlePredict</text>
  <path class="line-blue" d="M 592 905 L 592 950"/>
  <text class="tiny" x="610" y="932">응답 수신</text>
  <path class="line-gray" d="M 525 995 C 385 1045, 245 1035, 175 910"/>
  <text class="tiny" x="318" y="1035">handleReset → 전체 초기화</text>

  <!-- Components -->
  <rect class="card" x="820" y="715" width="710" height="350"/>
  <text class="section-title" x="855" y="758">3. 컴포넌트 구조</text>
  <text class="small" x="857" y="785">App.tsx를 기준으로 Sidebar와 Main 영역으로 분리</text>

  <rect fill="#eff6ff" stroke="#93c5fd" stroke-width="2" rx="14" x="860" y="825" width="160" height="58"/>
  <text class="label" x="910" y="858">App.tsx</text>

  <rect fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="14" x="860" y="925" width="260" height="105"/>
  <text class="label" x="890" y="955">aside / Sidebar</text>
  <text class="tiny" x="890" y="980">StepIndicator · Section</text>
  <text class="tiny" x="890" y="1000">SliderRow · Badge · Legend</text>

  <rect fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="14" x="1220" y="925" width="260" height="105"/>
  <text class="label" x="1252" y="955">main / Map + AI</text>
  <text class="tiny" x="1252" y="980">Banner · TyphoonMap</text>
  <text class="tiny" x="1252" y="1000">TileLayer · Polyline · Marker</text>

  <path class="line-gray" d="M 940 884 L 940 920"/>
  <path class="line-gray" d="M 1022 854 C 1160 858, 1300 880, 1350 920"/>

  <!-- Map layer mini stack -->
  <rect fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="14" x="1110" y="820" width="370" height="80"/>
  <text class="label" x="1135" y="848">지도 레이어 z-index</text>
  <text class="tiny" x="1135" y="872">OSM Tile → 유사 태풍 점선 → 예측 라인 → 예측 마커 → 시작점 핀</text>

  <!-- State List -->
  <rect fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="16" x="1045" y="165" width="410" height="48"/>
  <text class="small" x="1065" y="195">핵심 상태: phase · startPoint · pressure · sst · loading · predictedTrack · analogs · explanation</text>

  <!-- Footer -->
  <text class="tiny" x="80" y="1115">Generated from UI_Architecture.md · TyphoonPath 화면설계서 v1.0</text>
</svg>
